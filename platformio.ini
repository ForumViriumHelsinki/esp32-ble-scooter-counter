; PlatformIO Project Configuration File
; ESP32 BLE Scooter Counter
;
; Build commands:
;   pio run                          - Build all environments
;   pio run -e tbeam                 - Build for T-Beam only
;   pio run -e lora32                - Build for LoRa32 only
;   pio run -e wroom32               - Build for ESP-WROOM-32 only
;   pio run -e tbeam -t upload       - Upload to T-Beam
;   pio run -e lora32 -t upload      - Upload to LoRa32
;   pio run -e wroom32 -t upload     - Upload to ESP-WROOM-32

[platformio]
default_envs = tbeam, lora32, wroom32

[env]
platform = espressif32@6.9.0
framework = arduino
monitor_speed = 115200
upload_speed = 230400
monitor_filters = esp32_exception_decoder, time
lib_deps =
    h2zero/NimBLE-Arduino@^2.1.2
    knolleary/PubSubClient@^2.8
    adafruit/Adafruit GFX Library@^1.11.11
    adafruit/Adafruit SSD1306@^2.5.13
build_flags =
    -D CORE_DEBUG_LEVEL=1

; LILYGO T-Beam v1.1/v1.2 (with AXP2101 PMU, LoRa radio)
[env:tbeam]
upload_speed = 460800
board = ttgo-t-beam
build_flags =
    ${env.build_flags}
    -D BOARD_TBEAM=1
    -D HAS_LORA=1
    -D HAS_OLED=0

; LILYGO TTGO LoRa32 V2.1_1.6 (with SD card slot, LoRa radio, SSD1306 OLED)
[env:lora32]
upload_speed = 460800
board = ttgo-lora32-v21
build_flags =
    ${env.build_flags}
    -D BOARD_LORA32=1
    -D HAS_LORA=1
    -D HAS_OLED=1
    -D OLED_TYPE=SSD1306

; ESP-WROOM-32 development board (basic ESP32, no additional peripherals)
[env:wroom32]
upload_speed = 460800
board = esp32dev
build_flags =
    ${env.build_flags}
    -D BOARD_WROOM32=1
    -D HAS_LORA=0
    -D HAS_OLED=0
